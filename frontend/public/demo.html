<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - Beautiful Peach Theme</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Peach Theme Colors */
            --peach-50: #FFF5F0;
            --peach-100: #FFE8DD;
            --peach-200: #FFD0BB;
            --peach-300: #FFB899;
            --peach-400: #FFA077;
            --peach-500: #FF8855;
            --peach-600: #E66D3C;
            --peach-700: #CC5323;
            --peach-800: #B3380A;
            --peach-900: #991F00;

            /* Neutral */
            --neutral-50: #FAFAFA;
            --neutral-100: #F5F5F5;
            --neutral-200: #E5E5E5;
            --neutral-300: #D4D4D4;
            --neutral-400: #A3A3A3;
            --neutral-500: #737373;
            --neutral-600: #525252;
            --neutral-700: #404040;
            --neutral-800: #262626;
            --neutral-900: #171717;

            /* Status */
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --info: #3B82F6;

            /* Typography */
            --font-display: 'Playfair Display', serif;
            --font-body: 'Inter', -apple-system, sans-serif;

            /* Spacing */
            --space-xs: 0.25rem;
            --space-sm: 0.5rem;
            --space-md: 1rem;
            --space-lg: 1.5rem;
            --space-xl: 2rem;
            --space-2xl: 3rem;

            /* Shadows */
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: var(--font-body);
            background: linear-gradient(135deg, var(--peach-50) 0%, var(--neutral-50) 100%);
            min-height: 100vh;
            color: var(--neutral-800);
            line-height: 1.6;
        }

        #root {
            max-width: 1400px;
            margin: 0 auto;
            padding: var(--space-lg);
        }

        h1, h2, h3 {
            font-family: var(--font-display);
            font-weight: 700;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--peach-700);
            margin-bottom: var(--space-xl);
        }

        h2 {
            font-size: 1.75rem;
            color: var(--peach-600);
            margin-bottom: var(--space-lg);
        }

        h3 {
            font-size: 1.25rem;
            color: var(--neutral-700);
            margin-bottom: var(--space-md);
        }

        /* Card Styles */
        .card {
            background: white;
            border-radius: 16px;
            padding: var(--space-xl);
            box-shadow: var(--shadow-lg);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-xl);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-lg);
            padding-bottom: var(--space-md);
            border-bottom: 2px solid var(--peach-100);
        }

        /* Grid Layout */
        .grid {
            display: grid;
            gap: var(--space-lg);
            margin-bottom: var(--space-xl);
        }

        .grid-2 {
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        }

        .grid-3 {
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        }

        /* Button Styles */
        .btn {
            padding: var(--space-md) var(--space-xl);
            border-radius: 12px;
            border: none;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--peach-500) 0%, var(--peach-600) 100%);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            background: linear-gradient(135deg, var(--peach-600) 0%, var(--peach-700) 100%);
        }

        .btn-secondary {
            background: var(--neutral-100);
            color: var(--neutral-700);
        }

        .btn-secondary:hover {
            background: var(--neutral-200);
        }

        /* Floating Add Button */
        .floating-add-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--peach-500) 0%, var(--peach-600) 100%);
            color: white;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: var(--shadow-xl);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .floating-add-btn:hover {
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 25px 30px -5px rgb(0 0 0 / 0.2);
        }

        /* Budget Overview */
        .budget-overview {
            background: linear-gradient(135deg, var(--peach-500) 0%, var(--peach-600) 100%);
            color: white;
            border-radius: 20px;
            padding: var(--space-2xl);
            box-shadow: var(--shadow-xl);
            margin-bottom: var(--space-xl);
        }

        .budget-amount {
            font-size: 3.5rem;
            font-family: var(--font-display);
            font-weight: 700;
            margin: var(--space-md) 0;
        }

        .budget-label {
            font-size: 0.875rem;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .budget-status {
            display: inline-block;
            padding: var(--space-sm) var(--space-md);
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-top: var(--space-md);
        }

        .status-safe {
            background: var(--success);
            color: white;
        }

        .status-caution {
            background: var(--warning);
            color: white;
        }

        .status-danger {
            background: var(--danger);
            color: white;
        }

        /* Progress Bar */
        .progress-container {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            height: 12px;
            margin: var(--space-lg) 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            border-radius: 20px;
            transition: width 0.6s ease;
        }

        /* Input Styles */
        .input-group {
            margin-bottom: var(--space-lg);
        }

        .input-label {
            display: block;
            font-weight: 600;
            color: var(--neutral-700);
            margin-bottom: var(--space-sm);
            font-size: 0.875rem;
        }

        .input {
            width: 100%;
            padding: var(--space-md);
            border: 2px solid var(--neutral-200);
            border-radius: 12px;
            font-family: var(--font-body);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input:focus {
            outline: none;
            border-color: var(--peach-400);
            box-shadow: 0 0 0 3px rgba(255, 136, 85, 0.1);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(4px);
        }

        .modal {
            background: white;
            border-radius: 20px;
            padding: var(--space-2xl);
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-xl);
            animation: modalSlideUp 0.3s ease;
        }

        @keyframes modalSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Expense List */
        .expense-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }

        .expense-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-lg);
            background: var(--neutral-50);
            border-radius: 12px;
            border-left: 4px solid var(--peach-400);
            transition: all 0.3s ease;
        }

        .expense-item:hover {
            background: white;
            box-shadow: var(--shadow-md);
            transform: translateX(4px);
        }

        .expense-info {
            flex: 1;
        }

        .expense-description {
            font-weight: 600;
            color: var(--neutral-800);
            margin-bottom: var(--space-xs);
        }

        .expense-meta {
            font-size: 0.875rem;
            color: var(--neutral-500);
        }

        .expense-amount {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--peach-600);
            font-family: var(--font-display);
        }

        .category-badge {
            display: inline-block;
            padding: var(--space-xs) var(--space-md);
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: var(--space-sm);
        }

        /* Charts */
        .chart-container {
            position: relative;
            height: 300px;
            margin: var(--space-lg) 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .budget-amount {
                font-size: 2.5rem;
            }

            .grid-2, .grid-3 {
                grid-template-columns: 1fr;
            }

            .floating-add-btn {
                bottom: 1rem;
                right: 1rem;
                width: 56px;
                height: 56px;
            }
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease;
        }

        /* Loading Spinner */
        .spinner {
            border: 3px solid var(--neutral-200);
            border-top: 3px solid var(--peach-500);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: var(--space-xl) auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect } = React;

    // Sample data
    const SAMPLE_CATEGORIES = [
        { id: 1, name: 'Food & Dining', color: '#FF6B6B', icon: '🍽️' },
        { id: 2, name: 'Transportation', color: '#4ECDC4', icon: '🚗' },
        { id: 3, name: 'Shopping', color: '#FFE66D', icon: '🛍️' },
        { id: 4, name: 'Bills & Utilities', color: '#95E1D3', icon: '💡' },
        { id: 5, name: 'Entertainment', color: '#F38181', icon: '🎬' },
        { id: 6, name: 'Health & Fitness', color: '#AA96DA', icon: '💪' },
        { id: 7, name: 'Skincare and Body Care', color: '#14183D', icon: '💅🏿'}
    ];

    const SAMPLE_EXPENSES = [
        { id: 1, amount: 3500, description: 'Lunch at Chicken Republic', category: 1, paymentMethod: 'card', date: new Date(), note: 'Team lunch meeting' },
        { id: 2, amount: 1500, description: 'Uber to VI', category: 2, paymentMethod: 'transfer', date: new Date(Date.now() - 86400000), note: '' },
        { id: 3, amount: 25000, description: 'New shoes from Jumia', category: 3, paymentMethod: 'card', date: new Date(Date.now() - 172800000), note: 'Nike Air Max' },
        { id: 4, amount: 2000, description: 'Groceries', category: 1, paymentMethod: 'cash', date: new Date(), note: 'ShopRite weekly shopping' },
    ];

    // Format currency
    const formatCurrency = (amount, currency = 'NGN') => {
        const symbols = { NGN: '₦', USD: '$', EUR: '€', GBP: '£' };
        return `${symbols[currency] || '₦'}${amount.toLocaleString('en-NG', { minimumFractionDigits: 2 })}`;
    };

    // Format date
    const formatDate = (date) => {
        const now = new Date();
        const diff = now - date;
        const days = Math.floor(diff / 86400000);

        if (days === 0) return 'Today';
        if (days === 1) return 'Yesterday';
        if (days < 7) return `${days} days ago`;
        return date.toLocaleDateString('en-NG', { month: 'short', day: 'numeric' });
    };

    // Budget Overview Component
    function BudgetOverview({ budget, spent, remaining, percentage, status }) {
        return (
            <div className="budget-overview fade-in">
                <div className="budget-label">Money Left This Month</div>
                <div className="budget-amount">{formatCurrency(remaining)}</div>
                <div className="progress-container">
                    <div
                        className="progress-bar"
                        style={{
                            width: `${Math.min(percentage, 100)}%`,
                            background: status === 'safe' ? 'var(--success)' :
                                status === 'caution' ? 'var(--warning)' : 'var(--danger)'
                        }}
                    />
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.875rem', opacity: 0.9 }}>
                    <span>Spent: {formatCurrency(spent)}</span>
                    <span>Budget: {formatCurrency(budget)}</span>
                </div>
                <div className={`budget-status status-${status}`}>
                    {status === 'safe' ? '✓ On Track' : status === 'caution' ? '⚠ Careful' : '⚠ Over Budget'}
                </div>
            </div>
        );
    }

    // Expense Item Component
    function ExpenseItem({ expense, categories }) {
        const category = categories.find(c => c.id === expense.category);

        return (
            <div className="expense-item fade-in">
                <div className="expense-info">
                    <div className="expense-description">
                        <span style={{ marginRight: '8px' }}>{category?.icon}</span>
                        {expense.description}
                    </div>
                    <div className="expense-meta">
                        {formatDate(expense.date)} • {expense.paymentMethod}
                        {expense.note && ` • ${expense.note}`}
                    </div>
                </div>
                <div className="expense-amount">-{formatCurrency(expense.amount)}</div>
            </div>
        );
    }

    // Add Expense Modal
    function AddExpenseModal({ isOpen, onClose, onAdd, categories }) {
        const [formData, setFormData] = useState({
            amount: '',
            description: '',
            category: '',
            paymentMethod: 'card',
            note: ''
        });

        if (!isOpen) return null;

        const handleSubmit = (e) => {
            e.preventDefault();
            onAdd({
                ...formData,
                amount: parseFloat(formData.amount),
                category: parseInt(formData.category),
                date: new Date()
            });
            setFormData({ amount: '', description: '', category: '', paymentMethod: 'card', note: '' });
            onClose();
        };

        return (
            <div className="modal-overlay" onClick={onClose}>
                <div className="modal" onClick={(e) => e.stopPropagation()}>
                    <h2>Add Expense</h2>
                    <form onSubmit={handleSubmit}>
                        <div className="input-group">
                            <label className="input-label">Amount (₦)</label>
                            <input
                                type="number"
                                className="input"
                                value={formData.amount}
                                onChange={(e) => setFormData({ ...formData, amount: e.target.value })}
                                placeholder="0.00"
                                required
                                autoFocus
                            />
                        </div>

                        <div className="input-group">
                            <label className="input-label">Description</label>
                            <input
                                type="text"
                                className="input"
                                value={formData.description}
                                onChange={(e) => setFormData({ ...formData, description: e.target.value })}
                                placeholder="What did you spend on?"
                                required
                            />
                        </div>

                        <div className="input-group">
                            <label className="input-label">Category</label>
                            <select
                                className="input"
                                value={formData.category}
                                onChange={(e) => setFormData({ ...formData, category: e.target.value })}
                                required
                            >
                                <option value="">Select category</option>
                                {categories.map(cat => (
                                    <option key={cat.id} value={cat.id}>
                                        {cat.icon} {cat.name}
                                    </option>
                                ))}
                            </select>
                        </div>

                        <div className="input-group">
                            <label className="input-label">Payment Method</label>
                            <select
                                className="input"
                                value={formData.paymentMethod}
                                onChange={(e) => setFormData({ ...formData, paymentMethod: e.target.value })}
                            >
                                <option value="card">Card</option>
                                <option value="cash">Cash</option>
                                <option value="transfer">Transfer</option>
                                <option value="mobile">Mobile Payment</option>
                            </select>
                        </div>

                        <div className="input-group">
                            <label className="input-label">Note (optional)</label>
                            <input
                                type="text"
                                className="input"
                                value={formData.note}
                                onChange={(e) => setFormData({ ...formData, note: e.target.value })}
                                placeholder="Additional details"
                            />
                        </div>

                        <div style={{ display: 'flex', gap: '12px', marginTop: '24px' }}>
                            <button type="submit" className="btn btn-primary" style={{ flex: 1 }}>
                                Add Expense
                            </button>
                            <button type="button" className="btn btn-secondary" onClick={onClose}>
                                Cancel
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        );
    }

    // Main App Component
    function App() {
        const [expenses, setExpenses] = useState(SAMPLE_EXPENSES);
        const [categories] = useState(SAMPLE_CATEGORIES);
        const [isModalOpen, setIsModalOpen] = useState(false);
        const [budget] = useState({ total: 120000, spent: 32000 });

        const remaining = budget.total - budget.spent;
        const percentage = (remaining / budget.total) * 100;
        const status = percentage >= 50 ? 'safe' : percentage >= 25 ? 'caution' : 'danger';

        const handleAddExpense = (expense) => {
            setExpenses([{ ...expense, id: Date.now() }, ...expenses]);
        };

        // Calculate category totals
        const categoryTotals = categories.map(cat => ({
            ...cat,
            total: expenses
                .filter(e => e.category === cat.id)
                .reduce((sum, e) => sum + e.amount, 0)
        })).filter(cat => cat.total > 0);

        return (
            <div>
                <h1>💰 Expense Tracker</h1>

                <BudgetOverview
                    budget={budget.total}
                    spent={budget.spent}
                    remaining={remaining}
                    percentage={percentage}
                    status={status}
                />

                <div className="grid grid-2">
                    <div className="card">
                        <div className="card-header">
                            <h3>Recent Expenses</h3>
                            <span style={{ color: 'var(--neutral-500)', fontSize: '0.875rem' }}>
                                    {expenses.length} transactions
                                </span>
                        </div>
                        <div className="expense-list">
                            {expenses.slice(0, 5).map(expense => (
                                <ExpenseItem key={expense.id} expense={expense} categories={categories} />
                            ))}
                        </div>
                    </div>

                    <div className="card">
                        <div className="card-header">
                            <h3>Spending by Category</h3>
                        </div>
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                            {categoryTotals.slice(0, 5).map(cat => {
                                const percent = (cat.total / budget.spent) * 100;
                                return (
                                    <div key={cat.id} style={{ marginBottom: '12px' }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '8px' }}>
                                                <span>
                                                    <span style={{ marginRight: '8px' }}>{cat.icon}</span>
                                                    {cat.name}
                                                </span>
                                            <span style={{ fontWeight: 600, color: 'var(--peach-600)' }}>
                                                    {formatCurrency(cat.total)}
                                                </span>
                                        </div>
                                        <div className="progress-container" style={{ height: '8px' }}>
                                            <div
                                                className="progress-bar"
                                                style={{
                                                    width: `${percent}%`,
                                                    background: cat.color
                                                }}
                                            />
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>

                <div className="grid grid-3">
                    <div className="card">
                        <h3>Quick Stats</h3>
                        <div style={{ marginTop: '20px' }}>
                            <div style={{ marginBottom: '16px' }}>
                                <div style={{ fontSize: '0.875rem', color: 'var(--neutral-500)' }}>Avg Daily Spend</div>
                                <div style={{ fontSize: '1.5rem', fontWeight: 700, color: 'var(--peach-600)' }}>
                                    {formatCurrency(Math.round(budget.spent / 23))}
                                </div>
                            </div>
                            <div style={{ marginBottom: '16px' }}>
                                <div style={{ fontSize: '0.875rem', color: 'var(--neutral-500)' }}>Largest Expense</div>
                                <div style={{ fontSize: '1.5rem', fontWeight: 700, color: 'var(--peach-600)' }}>
                                    {formatCurrency(Math.max(...expenses.map(e => e.amount)))}
                                </div>
                            </div>
                            <div>
                                <div style={{ fontSize: '0.875rem', color: 'var(--neutral-500)' }}>Days Remaining</div>
                                <div style={{ fontSize: '1.5rem', fontWeight: 700, color: 'var(--peach-600)' }}>7</div>
                            </div>
                        </div>
                    </div>

                    <div className="card">
                        <h3>Payment Methods</h3>
                        <div style={{ marginTop: '20px' }}>
                            {['card', 'cash', 'transfer'].map(method => {
                                const total = expenses
                                    .filter(e => e.paymentMethod === method)
                                    .reduce((sum, e) => sum + e.amount, 0);
                                const percent = (total / budget.spent) * 100;

                                return (
                                    <div key={method} style={{ marginBottom: '16px' }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '8px' }}>
                                            <span style={{ textTransform: 'capitalize' }}>{method}</span>
                                            <span style={{ fontWeight: 600 }}>{formatCurrency(total)}</span>
                                        </div>
                                        <div className="progress-container" style={{ height: '6px' }}>
                                            <div
                                                className="progress-bar"
                                                style={{
                                                    width: `${percent}%`,
                                                    background: 'var(--peach-400)'
                                                }}
                                            />
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <div className="card">
                        <h3>This Month</h3>
                        <div style={{ marginTop: '20px', fontSize: '0.875rem', color: 'var(--neutral-600)', lineHeight: '1.8' }}>
                            <div style={{ marginBottom: '12px' }}>
                                💡 Your biggest spending is on <strong>Shopping</strong>
                            </div>
                            <div style={{ marginBottom: '12px' }}>
                                📊 You're <strong>{percentage.toFixed(0)}%</strong> within budget
                            </div>
                            <div>
                                🎯 At this rate, you'll have <strong>{formatCurrency(remaining - (budget.spent / 23 * 7))}</strong> left
                            </div>
                        </div>
                    </div>
                </div>

                <button
                    className="floating-add-btn"
                    onClick={() => setIsModalOpen(true)}
                    title="Add Expense"
                >
                    +
                </button>

                <AddExpenseModal
                    isOpen={isModalOpen}
                    onClose={() => setIsModalOpen(false)}
                    onAdd={handleAddExpense}
                    categories={categories}
                />
            </div>
        );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
