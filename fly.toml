app = "budget-tracker-api2"
primary_region = "jnb"

[build]
dockerfile = "Dockerfile"

[env]
SPRING_JPA_HIBERNATE_DDL_AUTO = "validate"

[http_service]
internal_port = 8085
force_https = true
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 1

[[vm]]
memory = "1024mb"
cpu_kind = "shared"
cpus = 1